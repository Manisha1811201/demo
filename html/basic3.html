<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in HTML</title>
</head>
<body>
    <table border="1px solid red">
        <tr aria-rowspan="4">Student details</tr>
        <thead>
            <tr>
                <th>Roll no.</th>
                <th>Student name </th>
                <th>Class</th>
                <th>Section</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Aman</td>
                <td>10th</td>
                <td>A</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Amit</td>
                <td>10th</td>
                <td>A</td>
            </tr>
            <tr>
                <td>23</td>
                <td>Anuj</td>
                <td>10th</td>
                <td>B</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
