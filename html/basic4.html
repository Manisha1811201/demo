<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in table</title>
</head>
<body>
    <form action="" method="">
        <fieldset>
            <label for="name">Name</label>
             <input id="name" value="" type="name" placeholder="Enter your name"><br><br>
            <label for="email">Email</label>
            <input id="email" value="" type="email" placeholder="Enter your email"><br><br>
             <label for="password">Password</label>
            <input id="password" value="" type="password" placeholder="Enter your password"><br><br>
             <label for="color">Color</label>
            <input id="color" value="" type="color"><br><br>
             <label for="date">Date</label>
            <input id="date" value="" type="date"><br><br>
             <label for="time">Time</label>
            <input id="time" value="" type="time"><br><br>
             <label for="week">Week</label>
            <input id="week" value="" type="week"><br><br>
            <label for="month">Month</label>
            <input id="month" value="" type="month"><br><br>
        </fieldset>
    </form>
</body>
</html>
